<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tejas Library</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color (matches teal brand) -->
    <meta name="theme-color" content="#0D9488" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TejasLib" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Preconnect to Supabase (performance) -->
    <!-- <link rel="preconnect" href="https://YOUR_PROJECT.supabase.co" /> -->

    <style>
      /* Prevent flash of unstyled content */
      body { margin: 0; background: #F0F4F8; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((reg) => console.log('[SW] Registered:', reg.scope))
            .catch((err) => console.warn('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
